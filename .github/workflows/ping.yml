name: TopBox cron
on:
  schedule:
    - cron: "*/5 * * * *" # survey dispatch
    - cron: "7 * * * *"   # care: morning report, escalations, nudges (offset from :00 — GitHub is congested on the hour)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: dispatch
        run: >-
          curl -fsS -m 60
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          "${{ secrets.APP_URL }}/api/cron/dispatch"
      - name: care
        if: github.event.schedule == '7 * * * *' || github.event_name == 'workflow_dispatch'
        run: >-
          curl -fsS -m 60
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
          "${{ secrets.APP_URL }}/api/cron/care"
